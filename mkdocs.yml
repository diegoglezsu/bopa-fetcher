site_name: pybopa
site_description: Documentation for pybopa
site_url: https://diegoglezsu.github.io/pybopa/
repo_url: https://github.com/diegoglezsu/pybopa
repo_name: diegoglezsu/pybopa

theme:
  name: material
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

nav:
  - index.md
  - getting-started.md
  - development.md
  - API Reference:
      - pybopa: api/pybopa.md
  - Use Cases:
      - use_cases/pybopa.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
